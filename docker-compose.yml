version: "3.9"

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI application ──────────────────────────────────────────────────
  api:
    build: .
    container_name: rag_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ragdb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data        # persist uploaded PDFs
      - ./static:/app/static    # live-reload frontend changes

volumes:
  pgdata:
